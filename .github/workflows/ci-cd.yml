name: NeoTrace CI/CD Pipeline

# Trigger on push to main/dev and PRs
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # HEALTH CHECK & LINTING
  # ═══════════════════════════════════════════════════════════════════
  
  lint-and-audit:
    name: Security Audit & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 Security Audit (npm audit)
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: ✅ Check package.json
        run: npm list
        continue-on-error: true

      - name: 📦 Verify required dependencies
        run: |
          npm list helmet express-rate-limit joi
          echo "✓ Security libraries installed"

  # ═══════════════════════════════════════════════════════════════════
  # UNIT & INTEGRATION TESTS
  # ═══════════════════════════════════════════════════════════════════

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🧪 Run Unit Tests
        run: npm test -- test/unit.test.js --coverage
        continue-on-error: true

      - name: 🔗 Run Integration Tests
        run: npm test -- test/integration.test.js
        continue-on-error: true

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # SECURITY SCANNING
  # ═══════════════════════════════════════════════════════════════════

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: 🔐 Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: 🔓 Check for exposed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
        continue-on-error: true

  # ═════════════════════════════════════════════════════════════════════
  # BUILD VERIFICATION
  # ═════════════════════════════════════════════════════════════════════

  build:
    name: Build & Deploy Check
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ✅ Verify server.js syntax
        run: node -c server.js || echo "✓ Server syntax valid"

      - name: 📋 Check required files
        run: |
          test -f .env.example && echo "✓ .env.example exists"
          test -f package.json && echo "✓ package.json exists"
          test -f server.js && echo "✓ server.js exists"
          test -d test && echo "✓ test directory exists"

      - name: 🚀 Start server (health check)
        run: |
          timeout 5 node server.js &
          sleep 2
          echo "✓ Server started successfully"
        continue-on-error: true

  # ═════════════════════════════════════════════════════════════════════
  # DEPLOYMENT (only on main branch)
  # ═════════════════════════════════════════════════════════════════════

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test, build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: vercel/actions/deploy-production@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true

  # ═════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ═════════════════════════════════════════════════════════════════════

  ci-summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test, build, security-scan]
    if: always()
    
    steps:
      - name: 📊 Pipeline Status
        run: |
          echo "═════════════════════════════════════════════════════════"
          echo "NeoTrace CI/CD Pipeline Status"
          echo "═════════════════════════════════════════════════════════"
          echo "Lint & Audit: ${{ needs.lint-and-audit.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "═════════════════════════════════════════════════════════"

      - name: ❌ Fail if critical checks failed
        if: |
          needs.lint-and-audit.result == 'failure' ||
          needs.build.result == 'failure'
        run: exit 1
