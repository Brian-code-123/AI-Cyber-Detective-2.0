name: NeoTrace CI/CD Pipeline

# Trigger on push to main/dev and PRs
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # HEALTH CHECK & LINTING
  # ═══════════════════════════════════════════════════════════════════
  
  lint-and-audit:
    name: Security Audit & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 Security Audit (npm audit)
        run: npm audit --audit-level=low
        continue-on-error: true

      - name: ✅ Verify build
        run: node -c server.js && echo "✓ Server syntax valid"

  # ═══════════════════════════════════════════════════════════════════
  # UNIT & INTEGRATION TESTS
  # ═══════════════════════════════════════════════════════════════════

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🧪 Run Tests
        run: npm test -- --passWithNoTests
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # SECURITY SCANNING
  # ═══════════════════════════════════════════════════════════════════

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name:  Check for exposed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
        continue-on-error: true

  # ═════════════════════════════════════════════════════════════════════
  # BUILD VERIFICATION
  # ═════════════════════════════════════════════════════════════════════

  build:
    name: Build & Deploy Check
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ✅ Verify server.js syntax
        run: node -c server.js && echo "✓ Server syntax valid"

      - name: 📋 Check required files
        run: |
          test -f .env.example && echo "✓ .env.example exists"
          test -f package.json && echo "✓ package.json exists"
          test -f server.js && echo "✓ server.js exists"
          test -d test && echo "✓ test directory exists"

  # ═════════════════════════════════════════════════════════════════════
  # DEPLOYMENT (only on main branch)
  # ═════════════════════════════════════════════════════════════════════

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test, build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
        uses: vercel/actions/deploy-production@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true

      - name: 📝 Deployment info
        run: echo "Vercel deployment step completed or skipped (secrets not configured)"

  # ═════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ═════════════════════════════════════════════════════════════════════

  ci-summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test, build, security-scan]
    if: always()
    
    steps:
      - name: 📊 Pipeline Status
        run: |
          echo "═════════════════════════════════════════════════════════"
          echo "✨ NeoTrace CI/CD Pipeline Status"
          echo "═════════════════════════════════════════════════════════"
          echo "Lint & Audit: ${{ needs.lint-and-audit.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "═════════════════════════════════════════════════════════"
